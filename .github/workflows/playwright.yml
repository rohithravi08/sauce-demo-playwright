name: Playwright Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: tests
        run: npm run test:chromium

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' test-results/results.json)
            PASSED=$(jq '.stats.expected' test-results/results.json)
            FAILED=$(jq '.stats.unexpected' test-results/results.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Playwright Tests: ${{ steps.tests.outcome }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright Test Results* ${{ steps.tests.outcome == 'success' && '✅' || '❌' }}\n\n*Status:* ${{ steps.tests.outcome }}\n*Branch:* ${{ github.head_ref || github.ref_name }}\n\n*Total Tests:* ${{ steps.results.outputs.total }}\n*Passed:* ${{ steps.results.outputs.passed }}\n*Failed:* ${{ steps.results.outputs.failed }}\n\n*Reports:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts|HTML Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts|Allure Results>"
                  }
                }
              ]
            }
