name: Playwright Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test-outcome: ${{ steps.tests.outcome }}
      failed-count: ${{ steps.results.outputs.failed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        run: npm run test:chromium

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' test-results/results.json)
            PASSED=$(jq '.stats.expected' test-results/results.json)
            FAILED=$(jq '.stats.unexpected' test-results/results.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results for healer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 1

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Playwright Tests: ${{ steps.tests.outcome }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright Test Results* ${{ steps.tests.outcome == 'success' && '✅' || '❌' }}\n\n*Status:* ${{ steps.tests.outcome }}\n*Branch:* ${{ github.head_ref || github.ref_name }}\n\n*Total Tests:* ${{ steps.results.outputs.total }}\n*Passed:* ${{ steps.results.outputs.passed }}\n*Failed:* ${{ steps.results.outputs.failed }}\n\n*Reports:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts|HTML Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts|Allure Results>"
                  }
                }
              ]
            }

  healer:
    runs-on: ubuntu-latest
    needs: test
    if: |
      needs.test.outputs.test-outcome == 'failure' &&
      github.ref == 'refs/heads/main' &&
      fromJSON(needs.test.outputs.failed-count) >= 1 &&
      fromJSON(needs.test.outputs.failed-count) <= 3
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Install Claude Code CLI and Playwright CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -g @playwright/cli@latest

      - name: Create fix branch
        id: branch
        run: |
          BRANCH_NAME="fix/healer-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run Playwright CLI Healer
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Debug and fix the failing Playwright tests. IMPORTANT: Fix only the FIRST failing test. Make minimal changes. If you cannot fix it, mark test as test.fixme(). Use playwright-cli for debugging. Read test-results/results.json first. Run npx playwright test <file> --project=chromium to verify." --max-turns 15 --allowedTools "Edit,Read,Bash,Glob,Grep,Write"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: auto-heal failing Playwright tests

          Automated fix generated by Claude Code Playwright Healer.
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin ${{ steps.branch.outputs.branch }}

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: Auto-heal failing Playwright tests (Run #${{ github.run_id }})" \
            --body "## Summary
          This PR was automatically generated by the Playwright CLI Healer.

          **Workflow run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Failed tests:** ${{ needs.test.outputs.failed-count }}

          ---
          *Generated by Claude Code Playwright Healer*" \
            --base main \
            --head ${{ steps.branch.outputs.branch }} \
            --assignee ${{ github.repository_owner }}

      - name: Notify Slack about healer PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Playwright Healer: PR Created",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Playwright Healer* :wrench:\n\nA fix PR has been created for failing tests.\n\n*Branch:* `${{ steps.branch.outputs.branch }}`\n*Failed Tests:* ${{ needs.test.outputs.failed-count }}\n\n<${{ github.server_url }}/${{ github.repository }}/pulls|View Pull Requests>"
                  }
                }
              ]
            }
